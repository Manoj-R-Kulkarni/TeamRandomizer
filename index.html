<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Team Randomizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg1: #f2fbf6;
      --bg2: #dff4e8;
      --ink: #123028;
      --muted: #3a5f54;
      --panel: #ffffff;
      --line: #cde8da;
      --accent: #0d9c66;
      --accent-dark: #0b7f53;
      --captain: #f59f00;
      --common: #c2410c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Sora", "Avenir Next", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 15%, rgba(13, 156, 102, 0.16), transparent 35%),
        radial-gradient(circle at 88% 0%, rgba(9, 107, 74, 0.15), transparent 30%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      padding: 14px;
    }

    .shell {
      max-width: 960px;
      margin: 0 auto;
      display: grid;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.25rem, 4.8vw, 2rem);
      letter-spacing: 0.02em;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      line-height: 1.4;
      font-size: 0.92rem;
    }

    .quote-note {
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: 10px;
      background: #ecf9f2;
      border-left: 4px solid var(--accent);
      color: #215247;
      font-size: 0.88rem;
      line-height: 1.35;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      padding: 14px;
      box-shadow: 0 10px 26px rgba(10, 58, 42, 0.08);
      animation: rise 380ms ease both;
    }

    .cols, .teams {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr;
    }

    .section-title {
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 8px;
    }

    #playersList {
      max-height: 46vh;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: #fbfffd;
    }

    #playersList label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 6px;
      border-radius: 8px;
      margin: 2px 0;
    }

    #playersList label:hover { background: #effaf4; }

    #playersList input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      flex: 0 0 auto;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
    }

    button:active { transform: translateY(1px); }

    .btn-primary {
      color: #fff;
      background: linear-gradient(180deg, var(--accent), var(--accent-dark));
      box-shadow: 0 10px 18px rgba(13, 156, 102, 0.3);
    }

    .btn-ghost {
      color: var(--ink);
      background: #eaf8f1;
      border: 1px solid var(--line);
    }

    .btn-yellow {
      color: #4a2f00;
      background: linear-gradient(180deg, #ffd84d, #ffc327);
      border: 1px solid #e2ad00;
      box-shadow: 0 10px 18px rgba(255, 195, 39, 0.42);
    }

    #regen {
      font-size: 1rem;
      font-weight: 800;
    }

    .count-pill {
      font-size: 1.8rem;
      font-weight: 800;
      line-height: 1;
      color: var(--accent-dark);
      margin: 4px 0 2px;
    }

    .meta {
      color: var(--muted);
      font-size: 0.86rem;
    }

    h3 {
      margin: 0 0 8px;
      font-size: 1rem;
    }

    ul {
      margin: 0;
      padding-left: 20px;
      display: grid;
      gap: 4px;
    }

    .captain {
      color: #0b63c9;
      font-weight: 800;
    }

    .captain::after {
      content: "C";
      display: inline-block;
      margin-left: 8px;
      padding: 1px 7px;
      border-radius: 999px;
      background: #0b63c9;
      color: #fff;
      font-size: 0.7rem;
      line-height: 1.35;
      vertical-align: middle;
    }

    .common {
      color: var(--common);
      font-weight: 700;
    }

    .toss-wrap {
      display: grid;
      gap: 10px;
    }

    .coin-stage {
      display: grid;
      place-items: center;
      min-height: 100px;
      border: 1px dashed var(--line);
      border-radius: 12px;
      background: #f9fffc;
      padding: 10px;
    }

    .coin {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 2px solid #d7a500;
      background: radial-gradient(circle at 30% 25%, #fff4b8, #f7c92f 65%, #e6b312);
      color: #6b4a00;
      font-weight: 800;
      display: grid;
      place-items: center;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.18);
      transform-style: preserve-3d;
    }

    .coin.flipping {
      animation: flip 800ms linear infinite;
    }

    .toss-meta {
      text-align: center;
      font-size: 0.9rem;
      color: var(--muted);
    }

    @keyframes flip {
      from { transform: rotateY(0deg) rotateX(0deg); }
      to { transform: rotateY(1080deg) rotateX(1080deg); }
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (min-width: 760px) {
      body { padding: 24px; }
      .cols { grid-template-columns: 1fr; }
      .teams { grid-template-columns: 1fr 1fr; }
      .actions { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="card">
      <h1>Cricket Team Randomizer</h1>
      <p class="hint">Select attendees, tap <strong>Generate teams</strong> and <strong>toss</strong> thats it !</p>
      <p class="quote-note" id="captainNote">Loading captain note...</p>
    </div>

    <div class="cols">
      <div class="card">
        <div class="section-title">Players Attending</div>
        <div id="playersList"></div>
        <div class="toolbar">
          <button class="btn-ghost" id="selectAll">Select all</button>
          <button class="btn-ghost" id="clearAll">Clear</button>
        </div>
      </div>

    </div>

    <div class="actions">
      <button class="btn-primary" id="generate">Generate teams</button>
      <button class="btn-yellow" id="regen">Regenerate (same players)</button>
    </div>

    <div class="teams">
      <div class="team card">
        <h3>Team A <span id="captA" class="meta"></span></h3>
        <ul id="teamA"></ul>
      </div>
      <div class="team card">
        <h3>Team B <span id="captB" class="meta"></span></h3>
        <ul id="teamB"></ul>
      </div>
    </div>

    <div class="card" id="tossCard">
      <div class="section-title">Toss</div>
      <div class="toss-wrap">
        <div class="meta" id="tossInstruction">Generate teams first, then tap Flip Coin.</div>
        <button class="btn-primary" id="startToss">Flip Coin (4s)</button>

        <div class="coin-stage">
          <div class="coin" id="coinFace">-</div>
          <div class="toss-meta" id="tossStatus" style="margin-top:8px">Waiting for toss</div>
        </div>
      </div>
    </div>

  </div>

  <script>
    function uniquePlayers(groups) {
      const set = new Set();
      groups.forEach(g=>g.players.forEach(p=>set.add(typeof p === 'string' ? p : p.name)));
      return Array.from(set);
    }

    function normalizeGroups(raw) {
      if (Array.isArray(raw)) return raw;
      // Obfuscated schema: { "players": [{"name":"...","gid":"x1"}] }
      if (raw && Array.isArray(raw.players)) {
        const byGroup = new Map();
        raw.players.forEach((p, idx) => {
          if (!p || !p.name) return;
          const gid = p.gid || `g_${idx}`;
          if (!byGroup.has(gid)) byGroup.set(gid, []);
          byGroup.get(gid).push(typeof p.weight === 'number' ? {name: p.name, weight: p.weight} : p.name);
        });
        return Array.from(byGroup.entries()).map(([gid, players]) => ({name: gid, players}));
      }
      return [];
    }

    function shuffle(a) { for (let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} }

    function generateTeamsFrom(groups, selectedPlayers) {
      // Build player -> {group, weight}
      const playerInfo = new Map();
      groups.forEach(g=>{
        const gw = (typeof g.weight === 'number') ? g.weight : 1;
        g.players.forEach(p=>{
          if (typeof p === 'string') playerInfo.set(p, {group: g.name||'__g', weight: gw});
          else if (p && p.name) playerInfo.set(p.name, {group: g.name||'__g', weight: (typeof p.weight==='number'?p.weight:gw)});
        });
      });

      function combinations(arr, k) {
        const res = [];
        function rec(start, chosen) {
          if (chosen.length===k) { res.push(chosen.slice()); return; }
          for (let i=start;i<arr.length;i++) { chosen.push(arr[i]); rec(i+1, chosen); chosen.pop(); }
        }
        rec(0, []);
        return res;
      }

      // Solve for a given player pool (no common player inside this pool).
      function solvePool(poolNames) {
        const buckets = new Map();
        poolNames.forEach(p=>{
          const info = playerInfo.get(p) || {group:'__ungrouped', weight:1};
          if (!buckets.has(info.group)) buckets.set(info.group, []);
          buckets.get(info.group).push({name:p, weight: info.weight});
        });

        const choicesPerGroup = Array.from(buckets.entries()).map(([g, players]) => {
          const s = players.length;
          const k1 = Math.floor(s/2);
          const k2 = s - k1;
          const sizes = (k1===k2) ? [k1] : [k1, k2];
          return {group: g, players, sizes};
        });

        let bestScore = Infinity;
        const bestCandidates = [];

        function search(idx, teamA, teamB, weightA, weightB) {
          if (idx===choicesPerGroup.length) {
            const weightDiff = Math.abs(weightA - weightB);
            const sizeDiff = Math.abs(teamA.length - teamB.length);
            const score = (weightDiff * 1000) + sizeDiff;
            if (score < bestScore) {
              bestScore = score;
              bestCandidates.length = 0;
              bestCandidates.push({teamA: teamA.slice(), teamB: teamB.slice(), weightA, weightB, weightDiff, sizeDiff, score});
            } else if (score === bestScore) {
              bestCandidates.push({teamA: teamA.slice(), teamB: teamB.slice(), weightA, weightB, weightDiff, sizeDiff, score});
            }
            return;
          }

          const {players, sizes} = choicesPerGroup[idx];
          for (const size of sizes) {
            const combs = combinations(players, size);
            for (const comb of combs) {
              const namesASet = new Set(comb.map(x=>x.name));
              const namesA = Array.from(namesASet);
              const namesB = players.filter(p=>!namesASet.has(p.name)).map(x=>x.name);
              const wA = comb.reduce((s,p)=>s+(p.weight||1),0);
              const wB = players.reduce((s,p)=>s+(p.weight||1),0) - wA;

              teamA.push(...namesA);
              teamB.push(...namesB);
              search(idx+1, teamA, teamB, weightA + wA, weightB + wB);
              teamA.splice(teamA.length - namesA.length, namesA.length);
              teamB.splice(teamB.length - namesB.length, namesB.length);
            }
          }
        }

        search(0, [], [], 0, 0);
        if (!bestCandidates.length) return null;
        return bestCandidates[Math.floor(Math.random() * bestCandidates.length)];
      }

      const uniqueCount = new Set(selectedPlayers).size;
      if (uniqueCount === 0) {
        return {teamA:[], teamB:[], captA:'', captB:'', common:null, weights:{a:0,b:0,diff:0}, sizeDiff:0};
      }

      let picked;
      let common = null;
      const pool = Array.from(new Set(selectedPlayers));

      if (pool.length % 2 === 1) {
        // Odd attendees: choose one common player and split the remaining pool.
        const candidateSolutions = [];
        for (const candidate of pool) {
          const reduced = pool.filter(p=>p!==candidate);
          const solved = solvePool(reduced);
          if (!solved) continue;
          // Common player contributes equally to both teams, so diff remains unchanged.
          const score = solved.score;
          candidateSolutions.push({common: candidate, solved, score});
        }
        if (!candidateSolutions.length) {
          return {teamA:[], teamB:[], captA:'', captB:'', common:null, weights:{a:0,b:0,diff:0}, sizeDiff:0};
        }
        const bestScore = Math.min(...candidateSolutions.map(x=>x.score));
        const best = candidateSolutions.filter(x=>x.score===bestScore);
        const pickedSolution = best[Math.floor(Math.random() * best.length)];
        common = pickedSolution.common;
        picked = pickedSolution.solved;
      } else {
        picked = solvePool(pool);
        if (!picked) {
          return {teamA:[], teamB:[], captA:'', captB:'', common:null, weights:{a:0,b:0,diff:0}, sizeDiff:0};
        }
      }

      const outA = picked.teamA.slice();
      const outB = picked.teamB.slice();
      if (common) {
        outA.push(common);
        outB.push(common);
      }

      shuffle(outA); shuffle(outB);
      const nonCommonA = common ? outA.filter(p => p !== common) : outA.slice();
      const nonCommonB = common ? outB.filter(p => p !== common) : outB.slice();

      // Prefer captains from the same capability group represented in both teams.
      const countByGroupA = new Map();
      const countByGroupB = new Map();
      nonCommonA.forEach(p => {
        const g = (playerInfo.get(p) || {group:'__ungrouped'}).group;
        countByGroupA.set(g, (countByGroupA.get(g) || 0) + 1);
      });
      nonCommonB.forEach(p => {
        const g = (playerInfo.get(p) || {group:'__ungrouped'}).group;
        countByGroupB.set(g, (countByGroupB.get(g) || 0) + 1);
      });

      const commonGroups = Array.from(countByGroupA.keys()).filter(g => countByGroupB.has(g));
      let captainPoolA = nonCommonA;
      let captainPoolB = nonCommonB;
      let captainGroup = null;

      if (commonGroups.length) {
        // Pick the strongest shared group by overlap score, random on ties.
        let bestScore = -1;
        let bestGroups = [];
        commonGroups.forEach(g => {
          const score = Math.min(countByGroupA.get(g) || 0, countByGroupB.get(g) || 0);
          if (score > bestScore) {
            bestScore = score;
            bestGroups = [g];
          } else if (score === bestScore) {
            bestGroups.push(g);
          }
        });
        captainGroup = bestGroups[Math.floor(Math.random() * bestGroups.length)];
        captainPoolA = nonCommonA.filter(p => (playerInfo.get(p) || {group:'__ungrouped'}).group === captainGroup);
        captainPoolB = nonCommonB.filter(p => (playerInfo.get(p) || {group:'__ungrouped'}).group === captainGroup);

        if (!captainPoolA.length || !captainPoolB.length) {
          captainPoolA = nonCommonA;
          captainPoolB = nonCommonB;
          captainGroup = null;
        }
      }

      const captA = captainPoolA.length ? captainPoolA[Math.floor(Math.random()*captainPoolA.length)] : '';
      const captB = captainPoolB.length ? captainPoolB[Math.floor(Math.random()*captainPoolB.length)] : '';

      return {
        teamA: outA,
        teamB: outB,
        captA,
        captB,
        captainGroup,
        common,
        weights: {a: picked.weightA, b: picked.weightB, diff: picked.weightDiff},
        sizeDiff: 0
      };
    }

    // Load groups from a hidden JSON file at startup
    function loadGroups() {
      try {
        return fetch('groups.json').then(res=>{
          if (!res.ok) throw new Error('groups.json not found');
          return res.json();
        }).then(raw=>{
          const groups = normalizeGroups(raw);
          window._groups = groups;
          window._allPlayers = uniquePlayers(groups);
          const shuffledPlayers = window._allPlayers.slice();
          shuffle(shuffledPlayers);
          buildPlayerCheckboxes(shuffledPlayers);
        }).catch(e=>{ console.error(e); alert('Could not load groups.json. Add groups.json to repository.'); });
      } catch (e) {
        console.error(e);
        alert('Could not load groups.json. Add groups.json to repository.');
      }
    }

    function loadCaptainNote() {
      const el = document.getElementById('captainNote');
      return fetch('captain_notes.txt').then(res => {
        if (!res.ok) throw new Error('captain_notes.txt not found');
        return res.text();
      }).then(text => {
        const lines = text.split('\n').map(x => x.trim()).filter(Boolean);
        if (!lines.length) {
          el.textContent = 'Captain says: Keep it simple and play as one team.';
          return;
        }
        const line = lines[Math.floor(Math.random() * lines.length)];
        el.textContent = line;
      }).catch(() => {
        el.textContent = 'Captain says: Keep it simple and play as one team.';
      });
    }

    function buildPlayerCheckboxes(players) {
      const root = document.getElementById('playersList');
      root.innerHTML = '';
      players.forEach(p=>{
        const id = 'pl_' + p.replace(/\s+/g,'_');
        const label = document.createElement('label');
        label.style.display = 'block';
        label.innerHTML = `<input type=checkbox id="${id}" value="${p}"> ${p}`;
        root.appendChild(label);
      });
      updateSelectedCount();
      // attach change listeners
      root.querySelectorAll('input[type=checkbox]').forEach(cb=>cb.addEventListener('change', updateSelectedCount));
    }

    function getSelectedPlayers() {
      const boxes = Array.from(document.querySelectorAll('#playersList input[type=checkbox]'));
      return boxes.filter(b=>b.checked).map(b=>b.value);
    }

    function updateSelectedCount() {
      // Kept as a no-op hook since selection listeners reuse this function.
    }

    function renderResult(res) {
      const aRoot = document.getElementById('teamA');
      const bRoot = document.getElementById('teamB');
      aRoot.innerHTML = '';
      bRoot.innerHTML = '';
      res.teamA.forEach(p=>{
        const li = document.createElement('li');
        li.textContent = p + (res.common===p ? ' (common)' : '');
        if (res.common===p) li.classList.add('common');
        if (p===res.captA) li.classList.add('captain');
        aRoot.appendChild(li);
      });
      res.teamB.forEach(p=>{
        const li = document.createElement('li');
        li.textContent = p + (res.common===p ? ' (common)' : '');
        if (res.common===p) li.classList.add('common');
        if (p===res.captB) li.classList.add('captain');
        bRoot.appendChild(li);
      });
      document.getElementById('captA').textContent = res.captA? 'Capt: '+res.captA: '';
      document.getElementById('captB').textContent = res.captB? 'Capt: '+res.captB: '';

      // Enable toss only after teams exist.
      window._tossReady = true;
      document.getElementById('tossInstruction').textContent = 'Teams ready. Tap Flip Coin to toss.';
    }

    function initToss() {
      const startToss = document.getElementById('startToss');
      const coinFace = document.getElementById('coinFace');
      const tossStatus = document.getElementById('tossStatus');

      window._tossReady = false;
      window._tossRunning = false;
      window._tossTimer = null;

      startToss.addEventListener('click', () => {
        if (!window._tossReady) {
          alert('Generate teams first.');
          return;
        }
        if (window._tossRunning) return;

        window._tossRunning = true;
        startToss.disabled = true;

        let left = 4;
        coinFace.classList.add('flipping');
        coinFace.textContent = 'Flip';
        tossStatus.textContent = `Choose locked. Tossing in ${left}s...`;

        window._tossTimer = setInterval(() => {
          left -= 1;
          if (left > 0) {
            tossStatus.textContent = `Tossing in ${left}s...`;
            return;
          }

          clearInterval(window._tossTimer);
          window._tossTimer = null;

          const result = Math.random() < 0.5 ? 'heads' : 'tails';
          coinFace.classList.remove('flipping');
          coinFace.textContent = result;

          tossStatus.textContent = `Result: ${result.toUpperCase()}`;

          window._tossRunning = false;
          startToss.disabled = false;
        }, 1000);
      });
    }
    document.getElementById('selectAll').addEventListener('click', ()=>{
      document.querySelectorAll('#playersList input[type=checkbox]').forEach(b=>b.checked=true);
      updateSelectedCount();
    });
    document.getElementById('clearAll').addEventListener('click', ()=>{
      document.querySelectorAll('#playersList input[type=checkbox]').forEach(b=>b.checked=false);
      updateSelectedCount();
    });

    document.getElementById('generate').addEventListener('click', ()=>{
      const groups = window._groups || [];
      const selected = getSelectedPlayers();
      if (selected.length===0) { alert('Select at least one attending player'); return; }
      const res = generateTeamsFrom(groups, selected);
      window._lastResult = {groups, selected, res};
      renderResult(res);
    });

    document.getElementById('regen').addEventListener('click', ()=>{
      if (!window._lastResult) { document.getElementById('generate').click(); return; }
      const {groups, selected} = window._lastResult;
      const res = generateTeamsFrom(groups, selected);
      window._lastResult.res = res;
      renderResult(res);
    });

    initToss();
    loadCaptainNote();
    loadGroups();
  </script>
</body>
</html>
